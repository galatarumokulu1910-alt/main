## 🎭 Σελίδα AMMF (AmmfPage)[cite: 1]

### Hero[cite: 1]

- **Breadcrumbs:** Αρχική Σελίδα → Ιδρύματα → Συνεργασία AMMF[cite: 1]
- **Τίτλος:** Ίδρυμα Αθανάσιος και Μαρίνα Μαρτίνου[cite: 1]
- **Απόφθεγμα:** "Διατηρώντας την κληρονομιά της νεοκλασικής Κωνσταντινούπολης μέσω της αποκατάστασης της πνευματικής κληρονομιάς."[cite: 1]
- **Παράγραφος 1:** Το Ίδρυμα Αθανάσιος και Μαρίνα Μαρτίνου (AMMF) διαδραμάτισε κρίσιμο ρόλο στην ολοκληρωμένη ανακαίνιση και τον οραματικό μετασχηματισμό αυτού του νεοκλασικού ορόσημου.[cite: 1] Η αφοσίωσή τους διασφαλίζει ότι το Ελληνικό Σχολείο Γαλατά παραμένει ένας ζωντανός πολιτιστικός χώρος για τις μελλοντικές γενιές.[cite: 1]
- **Παράγραφος 2:** Μέσω σχολαστικής αρχιτεκτονικής συντήρησης, το ίδρυμα συνδύασε την 120χρονη ιστορία του σχολείου με τις απαιτήσεις της σύγχρονης εποχής, δημιουργώντας ένα καταφύγιο τέχνης, αρχείων και ακαδημαϊκού διαλόγου στην καρδιά της πόλης.[cite: 1]
- **Λεζάντα:** Ανακαίνιση Κεντρικής Αίθουσας του Σχολείου, 2021[cite: 1]

### Στατιστικά[cite: 1]

| Ετικέτα[cite: 1] | Τιμή[cite: 1] |
|--------|-------|
| Συνεισφορά[cite: 1]  | Κύριος Συνεργάτης Ανακαίνισης[cite: 1] |
| Ημερομηνία[cite: 1]  | 2012[cite: 1] |
| Εστίαση[cite: 1]   | Αρχιτεκτονική Κληρονομιά[cite: 1] |

### Ενότητα Οράματος[cite: 1]

- **Επάνω ετικέτα:** Διατηρώντας μια Κληρονομιά 120 Ετών[cite: 1]
- **Τίτλος:** Ένα Όραμα για Πολιτιστική Διατήρηση[cite: 1]

| Κάρτα[cite: 1] | Περιγραφή[cite: 1] |
|------|----------|
| Αποκατάσταση Αρχείου[cite: 1] | Συστηματική ψηφιοποίηση και φυσική συντήρηση των ιστορικών αρχείων και ακαδημαϊκών εγγράφων του σχολείου.[cite: 1] |
| Δομική Ακεραιότητα[cite: 1] | Ενίσχυση των νεοκλασικών τοίχων με ταυτόχρονη διατήρηση των αυθεντικών αισθητικών στοιχείων του 19ου αιώνα.[cite: 1] |
| Σύγχρονος Χώρος[cite: 1] | Μετατροπή των ιστορικών τάξεων σε υπερσύγχρονους εκθεσιακούς χώρους και ακουστικές αίθουσες συνεδρίων.[cite: 1] |

### Εταιρική Συνεργασία[cite: 1]

- **Τίτλος:** Εταιρική Συνεργασία[cite: 1]
- **Παράγραφος:** Η συνεργασία μεταξύ του Ελληνικού Σχολείου Γαλατά και του AMMF χρησιμεύει ως μοντέλο για τη διαχείριση της ιδιωτικής-δημόσιας κληρονομιάς.[cite: 1] Εστιάζοντας τόσο σε υλικά (το κτίριο) όσο και σε άυλα (εκπαιδευτική ιστορία) στοιχεία, διασφαλίζουμε ότι το σχολείο συνεχίζει να συμβάλλει στον πνευματικό ιστό της Κωνσταντινούπολης.[cite: 1]
- **Κουμπί:** Προβολή Φωτογραφιών Αρχείου[cite: 1]

