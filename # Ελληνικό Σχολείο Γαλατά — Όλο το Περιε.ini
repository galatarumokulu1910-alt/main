## 🏠 Αρχική Σελίδα (HomePage)[cite: 1]

### Hero[cite: 1]

- **Τίτλος:** The Modern *Past*[cite: 1]
- **Υπότιτλος:** Ανακαλύψτε ξανά την ιστορία.[cite: 1] Ένα ορόσημο του 19ου αιώνα στην καρδιά του Γαλατά, τώρα σπίτι σύγχρονης τέχνης και πολιτισμού.[cite: 1]
- **CTA 1:** Διοργανώστε την Εκδήλωσή σας στην Ιστορία[cite: 1]
- **CTA 2:** Ανακαλύψτε την Ιστορία μας[cite: 1]

### Ενότητα Ιστορίας[cite: 1]

- **Τίτλος:** Ιστορία[cite: 1]
- **Παράγραφος 1:** Το Ελληνικό Σχολείο Γαλατά είναι ένα από τα σημαντικότερα εκπαιδευτικά ιδρύματα που ιδρύθηκαν από την ελληνική κοινότητα κατά τη διαδικασία εκσυγχρονισμού της Οθωμανικής Αυτοκρατορίας.[cite: 1] Το σχολείο χτίστηκε σε γη που δωρίστηκε από την Ελληνική Κοινότητα Γαλατά, με την υποστήριξη της Ελένης Ζαρίφη.[cite: 1]
- **Παράγραφος 2:** Το σχολείο άνοιξε στις 2 Ιουνίου 1910 και χτίστηκε από τους αρχιτέκτονες Πάτροκλο Καμπανάκη και Σταύρο Χρηστίδη, με τη συμβολή του συμβούλου αρχιτέκτονα Περικλή Φωτιάδη, στο νεοκλασικό-εκλεκτικιστικό στυλ της εποχής.[cite: 1]
- **Σύνδεσμος:** ΔΙΑΒΑΣΤΕ ΠΕΡΙΣΣΟΤΕΡΑ[cite: 1]

### Split Ενότητα (Αρχιτεκτονική)[cite: 1]

- **Τίτλος:** Στην καρδιά της Κωνσταντινούπολης με τη νεοκλασική αρχιτεκτονική της εποχής.[cite: 1]
- **Παράγραφος:** Το κτίριο του σχολείου επιστράφηκε στους ιδιοκτήτες του, την ελληνική κοινότητα της Κωνσταντινούπολης, το 2012.[cite: 1] Από τότε, έχει ανοίξει τις πόρτες του στην πολιτιστική και καλλιτεχνική ζωή της πόλης, φιλοξενώντας πολλές σημαντικές εκδηλώσεις.[cite: 1]

### Ενότητα Εκδηλώσεων[cite: 1]

- **Τίτλος:** Εκδηλώσεις[cite: 1]
- **Υπότιτλος:** Επερχόμενες εκθέσεις και πολιτιστικές συναντήσεις[cite: 1]
- **Σύνδεσμος:** Προβολή Όλων[cite: 1]
- **Εκδήλωση 1:** Γάτα με Τρία Πόδια — Έκθεση — 20.09 - 23.11.2023[cite: 1]
- **Εκδήλωση 2:** Πάνω στην Αρχιτεκτονική του Γαλατά — Συνέδριο — 05.12.2023[cite: 1]
- **Εκδήλωση 3:** Βραδιές Τζαζ στην Αυλή — Συναυλία — Εκδήλωση Σαββατοκύριακου[cite: 1]

