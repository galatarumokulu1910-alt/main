## 🏛️ Σελίδα Ιστορίας (HistoryPage)[cite: 1]

### Hero[cite: 1]

- **Τίτλος:** 120 Χρόνια *Ιστορίας*[cite: 1]
- **Υπότιτλος:** 120 χρόνια νεοκλασικής ιστορίας, ακαδημαϊκής αριστείας και πολιτιστικής μεταμόρφωσης στην καρδιά του Γαλατά.[cite: 1]
- **Σήμα:** 1885 — Έτος Ίδρυσης[cite: 1]

### Ενότητα Ιστορίας[cite: 1]

- **Τίτλος:** Ιστορία[cite: 1]
- **Παράγραφος 1:** Το Ελληνικό Σχολείο Γαλατά είναι ένα από τα σημαντικά κτίρια μεταξύ των εκπαιδευτικών ιδρυμάτων που υλοποιήθηκαν από την ελληνική κοινότητα κατά τη διαδικασία εκσυγχρονισμού της Οθωμανικής Αυτοκρατορίας.[cite: 1] Το σχολείο χτίστηκε σε γη που δωρίστηκε από την Ελληνική Κοινότητα Γαλατά, με την υποστήριξη της Ελένης Ζαρίφη, φιλανθρώπου της εποχής, προκειμένου να συμβάλει στη σύγχρονη εκπαίδευση και διδασκαλία των Ελλήνων παιδιών.[cite: 1]
- **Παράγραφος 2:** Αρχιτέκτονες του σχολείου είναι ο Πάτροκλος Καμπανάκης και ο Σταύρος Χρηστίδης· ο Περικλής Φωτιάδης παρείχε συμβουλευτικές αρχιτεκτονικές υπηρεσίες.[cite: 1] Τα εγκαίνια του σχολείου πραγματοποιήθηκαν την Τετάρτη 2 Ιουνίου 1910, στις 11:00 π.μ.[cite: 1]

### Χρονολόγιο (Timeline)[cite: 1]

| Έτος[cite: 1]  | Τίτλος[cite: 1]                                    | Περιγραφή[cite: 1] |
|------|-------------------------------------------|----------|
| 1885[cite: 1] | Ίδρυση[cite: 1]                                   | Ιδρύθηκε το Ελληνικό Σχολείο Γαλατά.[cite: 1] |
| 1910[cite: 1] | Επίσημα Εγκαίνια[cite: 1]                              | Τα επίσημα εγκαίνια πραγματοποιήθηκαν την Τετάρτη 2 Ιουνίου 1910, στις 11:00 π.μ.[cite: 1] |
| 1958[cite: 1] | Διαμόρφωση Πρόσοψης[cite: 1]                         | Το επίπεδο υψόμετρου της πρόσοψης του κτιρίου ρυθμίστηκε κατά τη διαπλάτυνση του κεντρικού δρόμου.[cite: 1] |
| 1988[cite: 1] | Αναστολή Εκπαιδευτικών Δραστηριοτήτων[cite: 1]    | Οι εκπαιδευτικές δραστηριότητες ανεστάλησαν λόγω δημογραφικών αλλαγών.[cite: 1] |
| 2000[cite: 1] | Εποχή Νηπιαγωγείου[cite: 1]                           | Το κτίριο λειτούργησε ως νηπιαγωγείο μεταξύ 2000 και 2007.[cite: 1] |
| 2012[cite: 1] | Επιστροφή[cite: 1]                                      | Το κτίριο επιστράφηκε στην Ελληνική Κοινότητα της Κωνσταντινούπολης.[cite: 1] |
| 2015[cite: 1] | Τέλος Σχολικής Λειτουργίας[cite: 1]                | Το κτίριο έπαψε επίσημα να λειτουργεί ως σχολείο.[cite: 1] |
| 2019[cite: 1] | Έναρξη Ανακαίνισης[cite: 1]                    | Ξεκίνησε ένα μεγάλο έργο ανακαίνισης για τη μετατροπή του σε πολιτιστικό και εκπαιδευτικό κέντρο.[cite: 1] |

### Μεσαίο Μπλοκ[cite: 1]

- **Τίτλος:** Χτισμένο στο νεοκλασικό-εκλεκτικιστικό αρχιτεκτονικό στυλ της περιόδου, το σχολείο βρίσκεται στον Γαλατά, το ιστορικό εμπορικό και οικονομικό κέντρο της Κωνσταντινούπολης, στη διασταύρωση των γειτονιών Kemeraltı και Bereketzade.[cite: 1]
- **Υπότιτλος:** Το κτίριο του σχολείου, που στο παρελθόν αντηχούσε από τις φωνές των παιδιών αλλά παρέμεινε σιωπηλό για πολλά χρόνια, επιστράφηκε στους ιδιοκτήτες του το 2012.[cite: 1]

### Ενότητα Ανακαίνισης[cite: 1]

- **Τίτλος:** Ανακαίνιση[cite: 1]
- **Παράγραφος 1:** Η υλοποίηση του έργου ανακαίνισης ξεκίνησε υπό την αιγίδα της Αυτού Θειοτάτης Παναγιότητος του Οικουμενικού Πατριάρχου κ.κ. Βαρθολομαίου Α'.[cite: 1] Ολοκληρώθηκε χάρη στις γενναιόδωρες και κομψές χορηγίες της Μαρίνας και του Αθανάσιου Μαρτίνου.[cite: 1] Η ανακαίνιση πραγματοποιήθηκε υπό την ηγεσία του Murat Tabanlıoğlu (Tabanlıoğlu Αρχιτέκτονες).[cite: 1]
- **Παράγραφος 2:** Το Ελληνικό Σχολείο Γαλατά, με τη νέα θεσμική του ονομασία «Το Σχολείο», στοχεύει να αποτελέσει τόσο έναν θεσμό ελληνικής ταυτότητας και πολιτιστικής κληρονομιάς διατηρώντας τη μνήμη και το βαθιά ριζωμένο παρελθόν του, όσο και έναν χώρο τέχνης και εκπαίδευσης που αγκαλιάζει όλους τους Κωνσταντινουπολίτες για να δημιουργήσει μια προοπτική για το μέλλον.[cite: 1]
- **Κουμπί:** Εξερευνήστε τις Λεπτομέρειες του Έργου[cite: 1]

