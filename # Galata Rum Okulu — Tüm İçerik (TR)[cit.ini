## 🏛️ Tarih Sayfası (HistoryPage)[cite: 1]

### Hero[cite: 1]

- **Başlık:** 120 Yıllık *Tarih*[cite: 1]
- **Alt Başlık:** Galata'nın kalbinde neoklasik tarih, akademik mükemmellik ve kültürel dönüşümün 120 yılı.[cite: 1]
- **Rozet:** 1885 — Kuruluş Yılı[cite: 1]

### Tarihçe Bölümü[cite: 1]

- **Başlık:** Tarihçe[cite: 1]
- **Paragraf 1:** Galata Rum Okulu, Osmanlı İmparatorluğu'nun modernleşme sürecinde Rum topluluğunun gerçekleştirdiği eğitim kurumları içindeki önemli bir yere sahip yapılardan biridir.[cite: 1] Okul, Rum çocukların modern eğitim ve öğretimine katkı sağlayabilmek amacıyla dönemin hayırseverlerinden Eleni Zarifi'nin destekleriyle, Galata Rum Cemaati tarafından bağışlanan arazi üzerinde inşa edilmiştir.[cite: 1]
- **Paragraf 2:** Okulun mimarları Patroklos Kambanakis ve Stavros Hristidis'tir; Perikli Fotiadis danışmanlık mimarlık hizmeti vermiştir.[cite: 1] Okulun açılışı 2 Haziran 1910 Çarşamba günü saat 11:00'de gerçekleştirilmiştir.[cite: 1]

### Kronoloji (Timeline)[cite: 1]

| Yıl[cite: 1] | Başlık[cite: 1] | Açıklama[cite: 1] |
|------|-------------------------------------------|----------|
| 1885[cite: 1] | Kuruluş[cite: 1] | Galata Rum Okulu kuruldu.[cite: 1] |
| 1910[cite: 1] | Resmi Açılış[cite: 1] | 2 Haziran 1910 Çarşamba günü saat 11:00'de resmi açılış gerçekleştirildi.[cite: 1] |
| 1958[cite: 1] | Cephe Düzenlemesi[cite: 1] | Ana cadde genişletilmesi sırasında binanın cephe kot seviyesi düzenlendi.[cite: 1] |
| 1988[cite: 1] | Eğitim Faaliyetlerinin Askıya Alınması[cite: 1] | Demografik değişimler nedeniyle eğitim faaliyetleri askıya alındı.[cite: 1] |
| 2000[cite: 1] | Anaokulu Dönemi[cite: 1] | 2000-2007 yılları arasında bina anaokulu olarak hizmet verdi.[cite: 1] |
| 2012[cite: 1] | İade[cite: 1] | Bina İstanbul Rum Cemaati'ne iade edildi.[cite: 1] |
| 2015[cite: 1] | Okul İşlevinin Sona Ermesi[cite: 1] | Bina resmi olarak okul işlevi görmeyi bıraktı.[cite: 1] |
| 2019[cite: 1] | Restorasyon Başlangıcı[cite: 1] | Kültür ve eğitim merkezi olarak dönüştürmek için büyük restorasyon projesi başlatıldı.[cite: 1] |

### Orta Blok[cite: 1]

- **Başlık:** Dönemin neoklasik-eklektik mimari üslubuyla inşa edilen okul, İstanbul'un tarihi ticaret ve finans merkezi Galata'da, Kemeraltı ve Bereketzade mahallelerinin kesişiminde bulunmaktadır.[cite: 1]
- **Alt Başlık:** Geçmişte çocuk sesleriyle yankılanan, ancak uzun yıllar sessizliğe gömülen okul binası 2012 yılında sahiplerine iade edilmiştir.[cite: 1]

### Restorasyon Bölümü[cite: 1]

- **Başlık:** Restorasyon[cite: 1]
- **Paragraf 1:** Restorasyon projesinin uygulaması Ekümenik Patrik Hazretleri I. Bartholomeos'un himayelerinde başlatılmıştır.[cite: 1] Sayın Marina ve Athanasios Martinos'un cömert ve zarif sponsorlukları sayesinde tamamlanmıştır.[cite: 1] Restorasyon Murat Tabanlıoğlu (Tabanlıoğlu Mimarlık) öncülüğünde gerçekleştirilmiştir.[cite: 1]
- **Paragraf 2:** Galata Rum Okulu, yeni kurumsal adıyla "Okul" hem geçmişten gelen hafızasını, köklü geçmişini koruyarak, Rum kimliği ve kültürel mirasının bir kurumu olmayı, hem de geleceğe yönelik bir perspektif yaratmak üzere tüm İstanbulluları kucaklayan bir sanat ve eğitim alanı olmayı hedeflemektedir.[cite: 1]
- **Buton:** Proje Detaylarını İncele[cite: 1]

