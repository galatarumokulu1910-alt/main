- **Etkinlik 1:** Üç Ayaklı Kedi — Sergi — 20.09 - 23.11.2023[cite: 1]
- **Etkinlik 2:** Galata Mimarisi Üzerine — Konferans — 05.12.2023[cite: 1]
- **Etkinlik 3:** Avlu Caz Geceleri — Konser — Hafta Sonu Etkinliği[cite: 1]

