## 🎭 AMMF Sayfası (AmmfPage)[cite: 1]

### Hero[cite: 1]

- **Breadcrumbs:** Ana Sayfa → Vakıflar → AMMF Güçbirliği[cite: 1]
- **Başlık:** Athanasios ve Marina Martinou Vakfı[cite: 1]
- **Alıntı:** "Entelektüel mirasın restorasyonu yoluyla neoklasik İstanbul'un mirasını korumak."[cite: 1]
- **Paragraf 1:** Athanasios ve Marina Martinou Vakfı (AMMF), bu neoklasik simge yapının kapsamlı restorasyonunda ve vizyoner dönüşümünde çok önemli bir rol oynamıştır.[cite: 1] Onların bağlılığı, Galata Rum Okulu'nun gelecek nesiller için canlı bir kültürel mekan olarak kalmasını sağlamaktadır.[cite: 1]
- **Paragraf 2:** Titiz bir mimari koruma sayesinde vakıf, okulun 120 yıllık tarihini modern çağın talepleriyle birleştirerek şehrin kalbinde sanat, arşivler ve akademik diyalog için bir sığınak yarattı.[cite: 1]
- **Alt Yazı:** Okulun Ana Salon Restorasyonu, 2021[cite: 1]

### İstatistikler[cite: 1]

| Etiket[cite: 1] | Değer[cite: 1] |
|--------|-------|
| Katkı[cite: 1]  | Öncü Restorasyon Ortağı[cite: 1] |
| Tarih[cite: 1]  | 2012[cite: 1] |
| Odak[cite: 1]   | Mimari Miras[cite: 1] |

### Vizyon Bölümü[cite: 1]

- **Üst etiket:** 120 Yıllık Mirası Korumak[cite: 1]
- **Başlık:** Kültürel Koruma İçin Bir Vizyon[cite: 1]

| Kart[cite: 1] | Açıklama[cite: 1] |
|------|----------|
| Arşiv Restorasyonu[cite: 1] | Okulun tarihi kayıtlarının ve akademik belgelerinin sistematik olarak dijitalleştirilmesi ve fiziksel olarak korunması.[cite: 1] |
| Yapısal Bütünlük[cite: 1] | Orijinal 19. yüzyıl estetik unsurlarını korurken neoklasik duvarları güçlendirmek.[cite: 1] |
| Modern Mekan[cite: 1] | Tarihi sınıfları son teknoloji sergi alanlarına ve akustik konferans salonlarına dönüştürmek.[cite: 1] |

### Kurumsal Ortaklık[cite: 1]

- **Başlık:** Kurumsal Ortaklık[cite: 1]
- **Paragraf:** Galata Rum Okulu ile AMMF arasındaki işbirliği, özel-kamu mirası yönetimi için bir model teşkil etmektedir.[cite: 1] Hem somut (bina) hem de somut olmayan (eğitim geçmişi) unsurlara odaklanarak, okulun İstanbul'un entelektüel dokusuna katkı sağlamaya devam etmesini sağlıyoruz.[cite: 1]
- **Buton:** Arşiv Fotoğraflarını Gör[cite: 1]

