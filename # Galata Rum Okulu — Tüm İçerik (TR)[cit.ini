## 🏠 Ana Sayfa (HomePage)[cite: 1]

### Hero[cite: 1]

- **Başlık:** The Modern *Past*[cite: 1]
- **Alt Başlık:** Tarihi yeniden tanıyın.[cite: 1] Galata'nın kalbinde 19. yüzyıldan kalma bir simge yapı, şimdi çağdaş sanat ve kültür evi.[cite: 1]
- **CTA 1:** Etkinliğinizi Tarihte Düzenleyin[cite: 1]
- **CTA 2:** Hikayemizi Keşfedin[cite: 1]

### Tarihçe Bölümü[cite: 1]

- **Başlık:** Tarihçe[cite: 1]
- **Paragraf 1:** Galata Rum Okulu, Osmanlı İmparatorluğu'nun modernleşme sürecinde Rum topluluğunun gerçekleştirdiği eğitim kurumları içindeki en önemli yerlerden biridir.[cite: 1] Okul, Eleni Zarifi'nin destekleriyle, Galata Rum Cemaati tarafından bağışlanan arazi üzerinde inşa edilmiştir.[cite: 1]
- **Paragraf 2:** 2 Haziran 1910 tarihinde açılan okul, mimar Patroklos Kambanakis ve Stavros Hristidis tarafından, danışmanlık mimarı Perikli Fotiadis katkısıyla dönemin neoklasik-eklektik üslubuyla inşa edilmiştir.[cite: 1]
- **Bağlantı:** DAHA FAZLA OKU[cite: 1]

### Split Bölüm (Mimarlık)[cite: 1]

- **Başlık:** Dönemin neoklasik mimarisiyle İstanbul'un kalbinde.[cite: 1]
- **Paragraf:** Okul binası 2012 yılında sahiplerine, İstanbul Rum cemaatine iade edilmiştir.[cite: 1] Bu tarihten itibaren şehrin kültür ve sanat hayatına kapılarını açarak birçok önemli etkinliğe ev sahipliği yapmaktadır.[cite: 1]

### Etkinlikler Bölümü[cite: 1]

